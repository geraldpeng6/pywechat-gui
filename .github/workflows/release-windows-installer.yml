name: Release Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Prepare release metadata
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $date = Get-Date -Format "yyyyMMdd"
            $shortSha = "${{ github.sha }}".Substring(0, 7)
            $tag = "manual-$date-$shortSha"
          }
          $safeTag = $tag.TrimStart("v")
          "RELEASE_LABEL=$safeTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ZIP_BASENAME=autowechat-windows-$safeTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INSTALLER_BASENAME=autowechat-setup-$safeTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install GUI build dependencies
        run: pip install .[dev-gui]

      - name: Run automated tests
        run: python -m unittest discover -s tests

      - name: Build Windows package
        run: pyinstaller pyweixin_gui.spec --noconfirm

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $sourceDir = Join-Path $env:GITHUB_WORKSPACE "dist\autowechat"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$env:RELEASE_LABEL" `
            "/DMyOutputBaseFilename=$env:INSTALLER_BASENAME" `
            "/DMySourceDir=$sourceDir" `
            "installer\windows.iss"

      - name: Archive build output
        shell: pwsh
        run: |
          $artifact = "dist/$env:ZIP_BASENAME.zip"
          if (Test-Path $artifact) { Remove-Item $artifact -Force }
          Compress-Archive -Path "dist/autowechat/*" -DestinationPath $artifact

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $installer = "dist/$env:INSTALLER_BASENAME.exe"
          $zip = "dist/$env:ZIP_BASENAME.zip"
          gh release view $tag --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag `
              $installer `
              $zip `
              --repo "${{ github.repository }}" `
              --clobber
          } else {
            gh release create $tag `
              $installer `
              $zip `
              --repo "${{ github.repository }}" `
              --title $tag `
              --generate-notes `
              --verify-tag
          }
