name: Build Windows Package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WINDOWS_CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
  WINDOWS_CODESIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PFX_PASSWORD }}
  WINDOWS_CODESIGN_TIMESTAMP_URL: ${{ vars.WINDOWS_CODESIGN_TIMESTAMP_URL }}

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Prepare artifact metadata
        shell: pwsh
        run: |
          $date = Get-Date -Format "yyyyMMdd"
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          "ARTIFACT_BASENAME=autowechat-windows-$date-$shortSha" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INSTALLER_BASENAME=autowechat-setup-$date-$shortSha" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_VERSION=$date-$shortSha" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install GUI build dependencies
        run: pip install .[dev-gui]

      - name: Run automated tests
        run: python -m unittest discover -s tests

      - name: Build Windows package
        run: pyinstaller pyweixin_gui.spec --noconfirm

      - name: Prepare code signing certificate
        if: ${{ env.WINDOWS_CODESIGN_PFX_BASE64 != '' && env.WINDOWS_CODESIGN_PFX_PASSWORD != '' }}
        shell: pwsh
        run: |
          $certDir = Join-Path $env:RUNNER_TEMP "codesign"
          New-Item -ItemType Directory -Path $certDir -Force | Out-Null
          $certPath = Join-Path $certDir "autowechat-codesign.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:WINDOWS_CODESIGN_PFX_BASE64))
          "WINDOWS_CODESIGN_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Skip code signing
        if: ${{ env.WINDOWS_CODESIGN_PFX_BASE64 == '' || env.WINDOWS_CODESIGN_PFX_PASSWORD == '' }}
        shell: pwsh
        run: Write-Host "未配置 Windows 代码签名证书，当前构建将生成未签名产物。"

      - name: Sign packaged binaries
        if: ${{ env.WINDOWS_CODESIGN_PFX_BASE64 != '' && env.WINDOWS_CODESIGN_PFX_PASSWORD != '' }}
        shell: pwsh
        run: |
          ./scripts/sign-windows.ps1 `
            -CertificatePath $env:WINDOWS_CODESIGN_CERT_PATH `
            -CertificatePassword $env:WINDOWS_CODESIGN_PFX_PASSWORD `
            -InputPaths @("dist/autowechat") `
            -TimestampUrl $(if ($env:WINDOWS_CODESIGN_TIMESTAMP_URL) { $env:WINDOWS_CODESIGN_TIMESTAMP_URL } else { "http://timestamp.digicert.com" }) `
            -Description "AutoWeChat"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $sourceDir = Join-Path $env:GITHUB_WORKSPACE "dist\autowechat"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$env:APP_VERSION" `
            "/DMyOutputBaseFilename=$env:INSTALLER_BASENAME" `
            "/DMySourceDir=$sourceDir" `
            "installer\windows.iss"

      - name: Sign installer
        if: ${{ env.WINDOWS_CODESIGN_PFX_BASE64 != '' && env.WINDOWS_CODESIGN_PFX_PASSWORD != '' }}
        shell: pwsh
        run: |
          ./scripts/sign-windows.ps1 `
            -CertificatePath $env:WINDOWS_CODESIGN_CERT_PATH `
            -CertificatePassword $env:WINDOWS_CODESIGN_PFX_PASSWORD `
            -InputPaths @("dist/$env:INSTALLER_BASENAME.exe") `
            -TimestampUrl $(if ($env:WINDOWS_CODESIGN_TIMESTAMP_URL) { $env:WINDOWS_CODESIGN_TIMESTAMP_URL } else { "http://timestamp.digicert.com" }) `
            -Description "AutoWeChat Setup"

      - name: Archive build output
        shell: pwsh
        run: |
          $artifact = "dist/$env:ARTIFACT_BASENAME.zip"
          if (Test-Path $artifact) { Remove-Item $artifact -Force }
          Compress-Archive -Path "dist/autowechat/*" -DestinationPath $artifact

      - name: Upload Windows zip artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ARTIFACT_BASENAME }}
          path: dist/${{ env.ARTIFACT_BASENAME }}.zip
          if-no-files-found: error

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.INSTALLER_BASENAME }}
          path: dist/${{ env.INSTALLER_BASENAME }}.exe
          if-no-files-found: error

      - name: Cleanup code signing certificate
        if: ${{ always() && env.WINDOWS_CODESIGN_PFX_BASE64 != '' && env.WINDOWS_CODESIGN_PFX_PASSWORD != '' }}
        shell: pwsh
        run: |
          if (Test-Path $env:WINDOWS_CODESIGN_CERT_PATH) {
            Remove-Item $env:WINDOWS_CODESIGN_CERT_PATH -Force
          }
