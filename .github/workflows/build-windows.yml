name: Build Windows Package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Prepare artifact metadata
        shell: pwsh
        run: |
          $date = Get-Date -Format "yyyyMMdd"
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          "ARTIFACT_BASENAME=pywechat-gui-windows-$date-$shortSha" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install GUI build dependencies
        run: pip install .[dev-gui]

      - name: Run automated tests
        run: python -m unittest discover -s tests

      - name: Build Windows package
        run: pyinstaller pyweixin_gui.spec --noconfirm

      - name: Archive build output
        shell: pwsh
        run: |
          $artifact = "dist/$env:ARTIFACT_BASENAME.zip"
          if (Test-Path $artifact) { Remove-Item $artifact -Force }
          Compress-Archive -Path "dist/pywechat-gui/*" -DestinationPath $artifact

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_BASENAME }}
          path: dist/${{ env.ARTIFACT_BASENAME }}.zip
          if-no-files-found: error
